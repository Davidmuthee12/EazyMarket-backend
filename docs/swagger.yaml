basePath: /v1
definitions:
  main.AddCategory:
    properties:
      image_url:
        maxLength: 100
        type: string
      name:
        maxLength: 100
        type: string
      slug:
        maxLength: 100
        type: string
    required:
    - name
    - slug
    type: object
  main.CartItemPayload:
    properties:
      product_id:
        type: string
      quantity:
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  main.CartQuantityPayload:
    properties:
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  main.CreateOrderPayload:
    properties:
      notes:
        maxLength: 500
        type: string
      shipping_address:
        additionalProperties: {}
        type: object
    type: object
  main.CreateUserTokenPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - email
    - password
    type: object
  main.ProductPayload:
    properties:
      category_id:
        type: string
      compare_price:
        type: number
      description:
        maxLength: 250
        type: string
      name:
        maxLength: 100
        type: string
      price:
        type: number
      sku:
        maxLength: 50
        type: string
      slug:
        maxLength: 100
        type: string
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      stock_quantity:
        type: integer
      weight:
        type: number
    required:
    - description
    - name
    - price
    - sku
    - slug
    - stock_quantity
    type: object
  main.RegisterUserPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
      username:
        maxLength: 100
        type: string
    required:
    - email
    - password
    - username
    type: object
  main.UpdateOrderStatusPayload:
    properties:
      status:
        enum:
        - confirmed
        - shipped
        - delivered
        - cancelled
        - refunded
        type: string
    required:
    - status
    type: object
  main.UpdateVendorProfile:
    properties:
      address:
        maxLength: 100
        type: string
      banner_url:
        maxLength: 100
        type: string
      business_email:
        maxLength: 255
        type: string
      business_phone:
        maxLength: 20
        type: string
      description:
        maxLength: 250
        type: string
      logo_url:
        maxLength: 100
        type: string
      storename:
        maxLength: 150
        type: string
      subdomain:
        maxLength: 63
        type: string
    required:
    - description
    - storename
    - subdomain
    type: object
  main.UserWithToken:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      phone:
        type: integer
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      status:
        type: string
      token:
        type: string
      username:
        type: string
    type: object
  main.VendorApplicationPayload:
    properties:
      address:
        maxLength: 100
        type: string
      banner_url:
        maxLength: 100
        type: string
      business_email:
        maxLength: 255
        type: string
      business_phone:
        maxLength: 20
        type: string
      description:
        maxLength: 250
        type: string
      logo_url:
        maxLength: 100
        type: string
      storename:
        maxLength: 150
        type: string
      subdomain:
        maxLength: 63
        type: string
    required:
    - description
    - storename
    - subdomain
    type: object
  store.Cart:
    properties:
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/store.CartItem'
        type: array
      status:
        type: string
      subtotal:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
      vendor_id:
        type: string
    type: object
  store.CartItem:
    properties:
      cart_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      product:
        $ref: '#/definitions/store.Products'
      product_id:
        type: string
      quantity:
        type: integer
      subtotal:
        type: number
      unit_price:
        type: number
      updated_at:
        type: string
    type: object
  store.Category:
    properties:
      created_at:
        type: string
      image_url:
        type: string
      name:
        type: string
      parent_id:
        type: string
      slug:
        type: string
    type: object
  store.Order:
    properties:
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/store.OrderItem'
        type: array
      notes:
        type: string
      shipping_address:
        type: object
      status:
        type: string
      total_amount:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  store.OrderItem:
    properties:
      commission_amt:
        type: number
      id:
        type: string
      order_id:
        type: string
      product:
        $ref: '#/definitions/store.Products'
      product_id:
        type: string
      quantity:
        type: integer
      subtotal:
        type: number
      unit_price:
        type: number
      vendor_id:
        type: string
      vendor_payout:
        type: number
    type: object
  store.Products:
    properties:
      category_id:
        type: string
      compare_price:
        type: number
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      sku:
        type: string
      slug:
        type: string
      status:
        type: string
      stock_quantity:
        type: integer
      updated_at:
        type: string
      weight:
        type: number
    type: object
  store.Role:
    properties:
      description:
        type: string
      level:
        type: integer
      name:
        type: string
      role_id:
        type: integer
    type: object
  store.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      phone:
        type: integer
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      status:
        type: string
      username:
        type: string
    type: object
  store.Vendor:
    properties:
      address:
        type: string
      banner_url:
        type: string
      business_email:
        type: string
      business_phone:
        type: string
      created_at:
        type: string
      description:
        type: string
      logo_url:
        type: string
      status:
        type: string
      storename:
        type: string
      subdomain:
        type: string
      user_id:
        type: string
    type: object
  store.Wishlist:
    properties:
      created_at:
        type: string
      product:
        $ref: '#/definitions/store.Products'
      product_id:
        type: string
      user_id:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This API for the Eazymarket app.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: EazyMarket APP API
paths:
  /admin/categories:
    get:
      description: Retrieves all product categories
      produces:
      - application/json
      responses:
        "200":
          description: Categories retrieved
          schema:
            items:
              $ref: '#/definitions/store.Category'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get all categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Creates a new product category. Requires admin privileges.
      parameters:
      - description: Category payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.AddCategory'
      produces:
      - application/json
      responses:
        "201":
          description: Category created
          schema:
            $ref: '#/definitions/store.Category'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Add a category
      tags:
      - categories
  /admin/categories/{id}:
    delete:
      description: Deletes a product category by ID. Requires admin privileges.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Delete a category
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Updates an existing product category. Requires admin privileges.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Category update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.AddCategory'
      produces:
      - application/json
      responses:
        "200":
          description: Category updated
          schema:
            $ref: '#/definitions/store.Category'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Update a category
      tags:
      - categories
  /admin/users/{userUUID}/suspend:
    put:
      description: Suspends an active user account. Suspended users cannot remain
        authorized after their cached user entry is invalidated.
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Suspends a user
      tags:
      - admin
  /admin/users/{userUUID}/unsuspend:
    put:
      description: Restores a suspended user account to active status and invalidates
        their cached user entry.
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Unsuspends a user
      tags:
      - admin
  /admin/vendor-request:
    get:
      description: Fetches all user requests to upgrade role to vendor
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.User'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches vendor upgrade requests
      tags:
      - users
  /admin/vendor-request/{userUUID}/approve:
    put:
      description: Approves a pending vendor role upgrade request for the given user
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Vendor request approved
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Approves a vendor upgrade request
      tags:
      - admin
  /admin/vendor-request/{userUUID}/reject:
    put:
      description: Rejects a pending vendor role upgrade request for the given user
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Vendor request rejected
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Rejects a vendor upgrade request
      tags:
      - admin
  /authentication/token:
    post:
      consumes:
      - application/json
      description: Creates a token for a user
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Token
          schema:
            type: string
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Creates a token
      tags:
      - authentication
  /authentication/users:
    post:
      consumes:
      - application/json
      description: Register a user
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterUserPayload'
      produces:
      - application/json
      responses:
        "201":
          description: User registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Register a user
      tags:
      - authentication
  /cart:
    delete:
      description: Removes all items from the authenticated user's active cart for
        the resolved storefront vendor.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      responses:
        "200":
          description: Cart cleared
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Clear cart
      tags:
      - cart
    get:
      description: Retrieves the authenticated user's active cart for the resolved
        storefront vendor.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Cart retrieved
          schema:
            $ref: '#/definitions/store.Cart'
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get cart
      tags:
      - cart
  /cart/items:
    post:
      consumes:
      - application/json
      description: Adds a published product from the resolved storefront vendor to
        the authenticated user's active storefront cart. Creates the cart automatically
        if it does not exist.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      - description: Cart item payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CartItemPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Cart item added
          schema:
            $ref: '#/definitions/store.CartItem'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Add item to cart
      tags:
      - cart
  /cart/items/{productID}:
    delete:
      description: Removes a product from the authenticated user's active cart for
        the resolved storefront vendor.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      - description: Product ID
        in: path
        name: productID
        required: true
        type: string
      responses:
        "200":
          description: Cart item removed
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Remove cart item
      tags:
      - cart
    put:
      consumes:
      - application/json
      description: Updates the quantity of a product in the authenticated user's active
        cart for the resolved storefront vendor.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      - description: Product ID
        in: path
        name: productID
        required: true
        type: string
      - description: Cart item quantity payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CartQuantityPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Cart item updated
          schema:
            $ref: '#/definitions/store.CartItem'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Update cart item
      tags:
      - cart
  /health:
    get:
      consumes:
      - application/json
      description: Returns API status, environment and version
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema: {}
      summary: Health check
      tags:
      - health
  /orders:
    get:
      description: Retrieves the authenticated user's orders.
      produces:
      - application/json
      responses:
        "200":
          description: Orders retrieved
          schema:
            items:
              $ref: '#/definitions/store.Order'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Creates an order from the authenticated user's active cart and
        clears the cart.
      parameters:
      - description: Order payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/main.CreateOrderPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Order created
          schema:
            $ref: '#/definitions/store.Order'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Create an order
      tags:
      - orders
  /orders/{orderID}:
    get:
      description: Retrieves one order for the authenticated user.
      parameters:
      - description: Order ID
        in: path
        name: orderID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Order retrieved
          schema:
            $ref: '#/definitions/store.Order'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Get order by ID
      tags:
      - orders
  /orders/{orderID}/cancel:
    put:
      description: Cancels a pending or confirmed order for the authenticated user.
      parameters:
      - description: Order ID
        in: path
        name: orderID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Order cancelled
          schema:
            $ref: '#/definitions/store.Order'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Cancel an order
      tags:
      - orders
  /storefront:
    get:
      description: Retrieves the approved vendor storefront resolved from the request
        subdomain. For local/dev clients, pass the vendor subdomain using X-Store-Subdomain
        or the store query parameter.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Storefront profile retrieved
          schema:
            $ref: '#/definitions/store.Vendor'
        "404":
          description: Storefront not found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Get storefront profile
      tags:
      - storefront
  /storefront/products:
    get:
      description: Retrieves published products for the approved vendor storefront
        resolved from the request subdomain. For local/dev clients, pass the vendor
        subdomain using X-Store-Subdomain or the store query parameter.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Published storefront products retrieved
          schema:
            items:
              $ref: '#/definitions/store.Products'
            type: array
        "404":
          description: Storefront not found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Get storefront products
      tags:
      - storefront
  /storefront/products/{slug}:
    get:
      description: Retrieves one published product from the approved vendor storefront
        resolved from the request subdomain. For local/dev clients, pass the vendor
        subdomain using X-Store-Subdomain or the store query parameter.
      parameters:
      - description: Vendor subdomain used when the request host is not a vendor subdomain
        in: header
        name: X-Store-Subdomain
        type: string
      - description: Vendor subdomain fallback for local/dev clients
        in: query
        name: store
        type: string
      - description: Product slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Published storefront product retrieved
          schema:
            $ref: '#/definitions/store.Products'
        "404":
          description: Storefront or product not found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Get storefront product by slug
      tags:
      - storefront
