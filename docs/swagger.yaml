basePath: /v1
definitions:
  main.CreateUserTokenPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        type: string
    required:
    - email
    type: object
  main.RegisterUserPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
      username:
        maxLength: 100
        type: string
    required:
    - email
    - password
    - username
    type: object
  main.UpdateVendorProfile:
    properties:
      address:
        maxLength: 100
        type: string
      banner_url:
        maxLength: 100
        type: string
      business_email:
        maxLength: 255
        type: string
      business_phone:
        maxLength: 20
        type: string
      description:
        maxLength: 250
        type: string
      logo_url:
        maxLength: 100
        type: string
      storename:
        maxLength: 150
        type: string
      subdomain:
        maxLength: 100
        type: string
    required:
    - description
    - storename
    - subdomain
    type: object
  main.UserWithToken:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      phone:
        type: integer
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      status:
        type: string
      token:
        type: string
      username:
        type: string
    type: object
  store.Role:
    properties:
      description:
        type: string
      level:
        type: integer
      name:
        type: string
      role_id:
        type: integer
    type: object
  store.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      phone:
        type: integer
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      status:
        type: string
      username:
        type: string
    type: object
  store.Vendor:
    properties:
      address:
        type: string
      banner_url:
        type: string
      business_email:
        type: string
      business_phone:
        type: string
      created_at:
        type: string
      description:
        type: string
      logo_url:
        type: string
      storename:
        type: string
      subdomain:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This API for the Eazymarket app.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: EazyMarket APP API
paths:
  /admin/vendor-request:
    get:
      description: Fetches all user requests to upgrade role to vendor
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.User'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches vendor upgrade requests
      tags:
      - users
  /admin/vendor-request/{userUUID}/approve:
    put:
      description: Approves a pending vendor role upgrade request for the given user
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Vendor request approved
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Approves a vendor upgrade request
      tags:
      - admin
  /admin/vendor-request/{userUUID}/reject:
    put:
      description: Rejects a pending vendor role upgrade request for the given user
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Vendor request rejected
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Rejects a vendor upgrade request
      tags:
      - admin
  /authentication/token:
    post:
      consumes:
      - application/json
      description: Creates a token for a user
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Token
          schema:
            type: string
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Creates a token
      tags:
      - authentication
  /authentication/users:
    post:
      consumes:
      - application/json
      description: Register a user
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterUserPayload'
      produces:
      - application/json
      responses:
        "201":
          description: User registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Register a user
      tags:
      - authentication
  /health:
    get:
      consumes:
      - application/json
      description: Returns API status, environment and version
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema: {}
      summary: Health check
      tags:
      - health
  /users/:
    get:
      description: Fetches all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.User'
            type: array
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches all users
      tags:
      - users
  /users/{userUUID}/:
    get:
      consumes:
      - application/json
      description: Fetches a user profile by ID
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches a user profile
      tags:
      - users
  /users/{userUUID}/upgrade-to-vendor:
    post:
      description: Submits a role upgrade request to vendor for the given user
      parameters:
      - description: user UUID
        in: path
        name: userUUID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Request submitted
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Request a vendor role upgrade
      tags:
      - users
  /users/activate/{token}:
    put:
      description: Activates/Register a user by invitation token
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: User activated
          schema:
            type: string
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Activates/Register a user
      tags:
      - users
  /vendor/profile:
    post:
      consumes:
      - application/json
      description: Creates a vendor profile for the authenticated vendor user
      parameters:
      - description: Vendor profile payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.UpdateVendorProfile'
      produces:
      - application/json
      responses:
        "201":
          description: Vendor profile created
          schema:
            $ref: '#/definitions/store.Vendor'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Creates a vendor profile
      tags:
      - vendor
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
